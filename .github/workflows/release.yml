name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare_release:
    name: FF Merge and Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          ref: 'develop'
          fetch-depth: 0

      - name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        id: bump
        with:
          github_token: ${{ secrets.PAT }}
          changelog_increment_filename: release_body.md

      - name: Upload Release Body
        uses: actions/upload-artifact@v7
        with:
          name: release-body.md
          path: release_body.md

  build:
    name: Build wheel and .deb
    needs: prepare_release
    uses: ./.github/workflows/build.yml
    with:
      branch: 'develop'

  release:
    name: Create Release
    needs: [prepare_release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./dist/

      - name: Move all artifact files to dist root
        run: |
          find ./dist -mindepth 2 -type f -exec mv -t ./dist {} +

      - name: Move release_body.md
        run: |
          mv ./dist/release_body.md .

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_body.md
          tag_name: v${{ needs.prepare_release.outputs.version }}
          files: ./dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push_to_main:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v7
        with:
          ref: 'main'
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Fast-forward merge from develop
        shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git merge --ff-only origin/develop
          git push origin main
